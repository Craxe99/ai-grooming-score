<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI-Grooming Score</title>
    <style>
      :root {
        --bg-1: #f4f7ff;
        --bg-2: #eefcf7;
        --card: #ffffff;
        --ink: #1f2a44;
        --muted: #5f6f93;
        --accent: #0d5bd6;
        --accent-2: #00a07f;
        --danger: #b42318;
        --ok: #067647;
        --shadow: 0 16px 48px rgba(30, 63, 122, 0.14);
        --radius-lg: 18px;
        --radius-md: 12px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Avenir Next", "Gill Sans", "Trebuchet MS", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at 10% 10%, rgba(13, 91, 214, 0.15), transparent 35%),
          radial-gradient(circle at 90% 20%, rgba(0, 160, 127, 0.12), transparent 30%),
          linear-gradient(135deg, var(--bg-1), var(--bg-2));
      }

      .page {
        max-width: 920px;
        margin: 0 auto;
        padding: 28px 16px 44px;
      }

      .hero {
        padding: 24px;
        border-radius: var(--radius-lg);
        background: linear-gradient(135deg, #0d5bd6, #0f8bce 62%, #00a07f);
        color: #ffffff;
        box-shadow: var(--shadow);
      }

      .hero h1 {
        margin: 0;
        font-size: clamp(1.5rem, 2.5vw, 2.1rem);
        letter-spacing: 0.2px;
      }

      .hero p {
        margin: 8px 0 0;
        line-height: 1.45;
        opacity: 0.95;
      }

      .grid {
        display: grid;
        gap: 16px;
        grid-template-columns: 1fr;
        margin-top: 18px;
      }

      .card {
        background: var(--card);
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow);
        padding: 18px;
      }

      .field {
        display: grid;
        gap: 8px;
      }

      .field label {
        font-weight: 700;
        color: #17326b;
      }

      .field small {
        color: var(--muted);
        line-height: 1.35;
      }

      input[type="number"] {
        width: 100%;
        border: 1px solid #d4def5;
        background: #f9fbff;
        color: var(--ink);
        padding: 10px 12px;
        border-radius: var(--radius-md);
        font: inherit;
      }

      input[type="number"]:focus {
        outline: 2px solid rgba(13, 91, 214, 0.25);
        border-color: #5e8ff0;
      }

      .platform-builder {
        display: grid;
        gap: 10px;
      }

      .chip-row {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 8px;
        min-height: 44px;
        padding: 8px;
        border-radius: var(--radius-md);
        border: 1px solid #d7e2fb;
        background: #f9fbff;
      }

      .chip {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        border: none;
        border-radius: 10px;
        background: #e8f1ff;
        color: #093f9d;
        padding: 6px 10px;
        font-size: 0.93rem;
        animation: rise 0.2s ease;
      }

      .chip button {
        border: none;
        background: transparent;
        color: #093f9d;
        cursor: pointer;
        padding: 0;
        font-size: 1rem;
        line-height: 1;
      }

      .add-wrap {
        position: relative;
      }

      .icon-btn {
        border: none;
        border-radius: 10px;
        width: 30px;
        height: 30px;
        cursor: pointer;
        color: #fff;
        background: linear-gradient(135deg, #0d5bd6, #0f8bce);
        box-shadow: 0 8px 14px rgba(13, 91, 214, 0.24);
        font-size: 1.1rem;
        line-height: 1;
      }

      .menu {
        position: absolute;
        top: calc(100% + 8px);
        left: 0;
        z-index: 2;
        min-width: 170px;
        border-radius: 12px;
        border: 1px solid #d6e3ff;
        background: #ffffff;
        box-shadow: 0 20px 40px rgba(18, 42, 98, 0.17);
        overflow: hidden;
      }

      .menu button {
        width: 100%;
        text-align: left;
        border: 0;
        background: #fff;
        padding: 9px 12px;
        cursor: pointer;
        font: inherit;
      }

      .menu button:hover {
        background: #f3f8ff;
      }

      .sp-list {
        display: grid;
        gap: 8px;
        margin-top: 8px;
      }

      .sp-row {
        display: grid;
        grid-template-columns: minmax(110px, 1fr) auto;
        gap: 8px;
        align-items: center;
        border: 1px solid #dde7ff;
        border-radius: 12px;
        padding: 8px 10px;
        background: #fdfefe;
      }

      .sp-row strong {
        color: #17326b;
      }

      .stepper {
        display: inline-flex;
        align-items: center;
        border: 1px solid #d4def5;
        border-radius: 10px;
        overflow: hidden;
      }

      .stepper-compact {
        justify-self: start;
        width: fit-content;
        border-color: #d7e2fb;
        background: #f9fbff;
      }

      .stepper button {
        border: 0;
        width: 32px;
        height: 32px;
        background: #edf3ff;
        cursor: pointer;
        color: #17326b;
        font-size: 1rem;
      }

      .stepper input {
        width: 66px;
        text-align: center;
        border: 0;
        border-left: 1px solid #d4def5;
        border-right: 1px solid #d4def5;
        border-radius: 0;
        background: #fff;
        padding: 6px;
      }

      .stepper input[type="number"] {
        -moz-appearance: textfield;
        appearance: textfield;
      }

      .stepper input[type="number"]::-webkit-outer-spin-button,
      .stepper input[type="number"]::-webkit-inner-spin-button {
        -webkit-appearance: none;
        margin: 0;
      }

      .metrics {
        display: grid;
        gap: 10px;
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .metric {
        border: 1px solid #dbe6ff;
        border-radius: 12px;
        background: #f8fbff;
        padding: 10px;
      }

      .metric span {
        display: block;
        color: var(--muted);
        font-size: 0.88rem;
      }

      .metric strong {
        display: block;
        margin-top: 4px;
        font-size: 1.1rem;
      }

      .result-banner {
        margin-top: 12px;
        border-radius: 12px;
        padding: 12px 14px;
        font-size: 1.05rem;
        font-weight: 700;
      }

      .result-ok {
        background: #e8f8f0;
        border: 1px solid #b6e8cf;
        color: var(--ok);
      }

      .result-no {
        background: #fff1f2;
        border: 1px solid #ffd1d4;
        color: var(--danger);
      }

      .hint {
        color: var(--muted);
        font-size: 0.9rem;
      }

      @keyframes rise {
        from {
          opacity: 0;
          transform: translateY(4px) scale(0.98);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }

      @media (max-width: 720px) {
        .metrics {
          grid-template-columns: 1fr;
        }

        .sp-row {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="hero">
        <h1>AI-Grooming Score</h1>
        <p>Калькулятор вычисляет необходимость применения AI в рамках задачи.</p>
      </section>

      <section class="grid">
        <article class="card">
          <div class="field">
            <label for="uInput">Уровень неизвестности кода (1-10)</label>
            <div class="stepper stepper-compact">
              <button id="uMinusBtn" type="button" aria-label="Уменьшить неизвестность">−</button>
              <input id="uInput" type="number" min="1" max="10" step="1" value="1" />
              <button id="uPlusBtn" type="button" aria-label="Увеличить неизвестность">+</button>
            </div>
          </div>
        </article>

        <article class="card">
          <div class="field platform-builder">
            <label>Платформы</label>
            <div class="chip-row" id="chipRow">
              <div class="add-wrap">
                <button class="icon-btn" id="addPlatformBtn" type="button" aria-label="Добавить платформу">+</button>
                <div id="platformMenu" class="menu" hidden></div>
              </div>
            </div>
          </div>
        </article>

        <article class="card">
          <div class="field">
            <label>Оценка по платформам</label>
            <div id="spList" class="sp-list"></div>
            <small id="emptySpHint" class="hint">Добавьте платформу, чтобы задать её оценку.</small>
            <div class="metric" style="margin-top: 8px">
              <span>Суммарная оценка</span>
              <strong id="spTotal">0</strong>
            </div>
          </div>
        </article>

        <article class="card">
          <div id="resultBanner" class="result-banner result-no">AI не требуется</div>
        </article>
      </section>
    </main>

    <script>
      const ALL_PLATFORMS = ["Backend", "WEB", "MAV", "Android", "iOS"];
      const MOBILE_PLATFORMS = new Set(["MAV", "Android", "iOS"]);

      const state = {
        selectedPlatforms: [],
        spByPlatform: {},
      };

      const uInput = document.getElementById("uInput");
      const uMinusBtn = document.getElementById("uMinusBtn");
      const uPlusBtn = document.getElementById("uPlusBtn");
      const addPlatformBtn = document.getElementById("addPlatformBtn");
      const platformMenu = document.getElementById("platformMenu");
      const chipRow = document.getElementById("chipRow");
      const spList = document.getElementById("spList");
      const emptySpHint = document.getElementById("emptySpHint");

      const spTotalNode = document.getElementById("spTotal");
      const resultBanner = document.getElementById("resultBanner");

      function parseWithFallback(rawValue, min, max, fallback = 1) {
        const value = String(rawValue ?? "").trim();
        if (value === "") {
          return fallback;
        }

        const numeric = Number(value);
        if (!Number.isFinite(numeric)) {
          return fallback;
        }

        const rounded = Math.round(numeric);
        return Math.max(min, Math.min(max, rounded));
      }

      function availablePlatforms() {
        return ALL_PLATFORMS.filter((platform) => !state.selectedPlatforms.includes(platform));
      }

      function detectPlatformMode(selectedPlatforms) {
        if (selectedPlatforms.length === 0) {
          return "M";
        }

        if (selectedPlatforms.length === 1) {
          return "S";
        }

        const hasBackend = selectedPlatforms.includes("Backend");
        const hasWeb = selectedPlatforms.includes("WEB");
        const mobileCount = selectedPlatforms.filter((platform) => MOBILE_PLATFORMS.has(platform)).length;

        if (hasBackend && hasWeb && mobileCount >= 1) {
          return "H";
        }

        if (hasBackend && (hasWeb || mobileCount >= 1)) {
          return "M";
        }

        return "M";
      }

      function resolveK(mode, selectedPlatforms) {
        if (mode === "S") {
          return 1.0;
        }

        if (mode === "H") {
          return 2.8;
        }

        const hasBackend = selectedPlatforms.includes("Backend");
        const hasWeb = selectedPlatforms.includes("WEB");
        const mobileCount = selectedPlatforms.filter((platform) => MOBILE_PLATFORMS.has(platform)).length;

        if (selectedPlatforms.length === 0) {
          return 1.8;
        }

        if (hasBackend && hasWeb && mobileCount === 0) {
          return 1.8;
        }

        if (hasBackend && !hasWeb) {
          if (mobileCount <= 1) {
            return 1.8;
          }
          if (mobileCount === 2) {
            return 2.1;
          }
          if (mobileCount >= 3) {
            return 2.4;
          }
        }

        return 1.8;
      }

      function calculateTotalSp() {
        return state.selectedPlatforms.reduce((sum, platform) => {
          const value = Number(state.spByPlatform[platform] ?? 0);
          return sum + (Number.isFinite(value) ? value : 0);
        }, 0);
      }

      function calculateScore(u, vn, mode) {
        if (mode === "S") {
          return 0.55 * u + 0.45 * vn;
        }
        if (mode === "H") {
          return 0.65 * u + 0.35 * vn;
        }
        return 0.6 * u + 0.4 * vn;
      }

      function resolveThreshold(mode) {
        return mode === "H" ? 5.0 : 5.5;
      }

      function resolveDecision(score, threshold) {
        return score >= threshold ? "Рекомендуется AI-подход" : "AI не требуется";
      }

      function renderPlatformMenu() {
        const available = availablePlatforms();
        platformMenu.innerHTML = "";

        if (available.length === 0) {
          addPlatformBtn.disabled = true;
          platformMenu.hidden = true;
          return;
        }

        addPlatformBtn.disabled = false;

        available.forEach((platform) => {
          const item = document.createElement("button");
          item.type = "button";
          item.textContent = platform;
          item.addEventListener("click", () => {
            state.selectedPlatforms.push(platform);
            state.spByPlatform[platform] = 1;
            platformMenu.hidden = true;
            renderAll();
          });
          platformMenu.appendChild(item);
        });
      }

      function renderChips() {
        const oldChips = chipRow.querySelectorAll(".chip");
        oldChips.forEach((chip) => chip.remove());

        const addWrap = chipRow.querySelector(".add-wrap");

        state.selectedPlatforms.forEach((platform) => {
          const chip = document.createElement("span");
          chip.className = "chip";
          chip.innerHTML = `<span>${platform}</span>`;

          const removeBtn = document.createElement("button");
          removeBtn.type = "button";
          removeBtn.setAttribute("aria-label", `Удалить ${platform}`);
          removeBtn.textContent = "×";
          removeBtn.addEventListener("click", () => {
            state.selectedPlatforms = state.selectedPlatforms.filter((item) => item !== platform);
            delete state.spByPlatform[platform];
            renderAll();
          });

          chip.appendChild(removeBtn);
          chipRow.insertBefore(chip, addWrap);
        });
      }

      function createSpRow(platform) {
        const row = document.createElement("div");
        row.className = "sp-row";

        const label = document.createElement("strong");
        label.textContent = platform;

        const controls = document.createElement("div");
        controls.className = "stepper";

        const minus = document.createElement("button");
        minus.type = "button";
        minus.textContent = "−";

        const input = document.createElement("input");
        input.type = "number";
        input.min = "1";
        input.step = "1";
        input.value = String(state.spByPlatform[platform] ?? 1);

        const plus = document.createElement("button");
        plus.type = "button";
        plus.textContent = "+";

        minus.addEventListener("click", () => {
          const current = parseWithFallback(state.spByPlatform[platform], 1, 9999, 1);
          state.spByPlatform[platform] = Math.max(1, current - 1);
          renderAll();
        });

        plus.addEventListener("click", () => {
          const current = parseWithFallback(state.spByPlatform[platform], 1, 9999, 1);
          state.spByPlatform[platform] = current + 1;
          renderAll();
        });

        input.addEventListener("input", (event) => {
          const raw = event.target.value;
          state.spByPlatform[platform] = parseWithFallback(raw, 1, 9999, 1);
          recalculate();
          spTotalNode.textContent = formatNumber(calculateTotalSp());
        });

        input.addEventListener("blur", (event) => {
          const raw = event.target.value;
          const normalized = parseWithFallback(raw, 1, 9999, 1);
          state.spByPlatform[platform] = normalized;
          event.target.value = String(normalized);
          recalculate();
        });

        controls.appendChild(minus);
        controls.appendChild(input);
        controls.appendChild(plus);

        row.appendChild(label);
        row.appendChild(controls);

        return row;
      }

      function renderSpList() {
        spList.innerHTML = "";

        if (state.selectedPlatforms.length === 0) {
          emptySpHint.hidden = false;
          return;
        }

        emptySpHint.hidden = true;

        state.selectedPlatforms.forEach((platform) => {
          spList.appendChild(createSpRow(platform));
        });
      }

      function formatNumber(value) {
        if (!Number.isFinite(value)) {
          return "0.00";
        }
        return value.toFixed(2);
      }

      function recalculate() {
        const u = parseWithFallback(uInput.value, 1, 10, 1);

        const mode = detectPlatformMode(state.selectedPlatforms);
        const k = resolveK(mode, state.selectedPlatforms);
        const spTotal = calculateTotalSp();
        const vn = k > 0 ? spTotal / k : 0;
        const score = calculateScore(u, vn, mode);
        const threshold = resolveThreshold(mode);
        const decision = resolveDecision(score, threshold);

        spTotalNode.textContent = formatNumber(spTotal);

        resultBanner.textContent = decision;
        if (decision === "Рекомендуется AI-подход") {
          resultBanner.className = "result-banner result-ok";
        } else {
          resultBanner.className = "result-banner result-no";
        }
      }

      function renderAll() {
        renderPlatformMenu();
        renderChips();
        renderSpList();
        recalculate();
      }

      addPlatformBtn.addEventListener("click", () => {
        const isHidden = platformMenu.hidden;
        if (isHidden) {
          renderPlatformMenu();
        }
        platformMenu.hidden = !isHidden;
      });

      document.addEventListener("click", (event) => {
        if (!event.target.closest(".add-wrap")) {
          platformMenu.hidden = true;
        }
      });

      uInput.addEventListener("input", recalculate);
      uInput.addEventListener("blur", () => {
        const normalized = parseWithFallback(uInput.value, 1, 10, 1);
        uInput.value = String(normalized);
        recalculate();
      });

      uMinusBtn.addEventListener("click", () => {
        const current = parseWithFallback(uInput.value, 1, 10, 1);
        const next = Math.max(1, current - 1);
        uInput.value = String(next);
        recalculate();
      });

      uPlusBtn.addEventListener("click", () => {
        const current = parseWithFallback(uInput.value, 1, 10, 1);
        const next = Math.min(10, current + 1);
        uInput.value = String(next);
        recalculate();
      });

      renderAll();
    </script>
  </body>
</html>
